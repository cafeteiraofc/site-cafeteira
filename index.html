<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cafeteira ☕ | Oficial</title>
    <style>
        /* Configurações Gerais de Fundo e Layout */
        body { 
            background-color: #0b071a; 
            background-image: radial-gradient(circle at top right, #3b1d70, transparent 40%), radial-gradient(circle at bottom left, #200f40, transparent 50%);
            color: #fff; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            text-align: center; 
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Menu de Navegação Superior */
        nav {
            background-color: #120d24;
            width: 100%;
            display: flex;
            justify-content: center;
            gap: 20px;
            padding: 15px 0;
            border-bottom: 2px solid #251b47;
        }
        nav a {
            color: #b9b3cc;
            text-decoration: none;
            font-weight: bold;
            font-size: 14px;
            text-transform: uppercase;
            padding: 5px 10px;
        }
        nav a.active {
            color: #fff;
            border-bottom: 3px solid #a855f7;
        }

        /* Container Principal do Site */
        .container {
            background-color: #1c1830;
            border: 3px solid #2d264d;
            border-radius: 24px;
            width: 90%;
            max-width: 500px;
            margin: 30px auto;
            padding: 25px 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        /* Foto do Personagem Centralizada com Círculo Luminoso */
        .avatar-container {
            position: relative;
            width: 180px;
            height: 180px;
            margin: 0 auto;
        }
        .avatar { 
            width: 100%; 
            height: 100%; 
            border-radius: 50%; 
            object-fit: cover;
            border: 4px solid #fff;
            box-shadow: 0 0 20px #e0f2fe;
        }

        /* Título Principal */
        h1 { 
            color: #c084fc; 
            font-size: 28px; 
            margin: 20px 0 5px 0; 
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: 800;
        }
        .subtitle {
            color: #94a3b8;
            font-size: 13px;
            margin-bottom: 25px;
            font-weight: 600;
        }

        /* Botões das Redes Sociais */
        .btn { 
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #1e1b4b, #311042); 
            color: #fff; 
            padding: 16px; 
            margin: 12px auto; 
            width: 85%; 
            text-decoration: none; 
            border-radius: 14px; 
            font-weight: bold;
            font-size: 15px;
            border: 1px solid #4c1d95;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            transition: 0.3s;
        }
        .btn:active {
            transform: scale(0.98);
            background: #4c1d95;
        }

        /* Seção do Último Vídeo (Simulado) */
        .video-box {
            background-color: #110e21;
            border: 2px solid #3b227e;
            border-radius: 16px;
            width: 85%;
            margin: 25px auto 10px auto;
            padding: 20px 10px;
        }
        .video-title {
            font-size: 14px;
            font-weight: bold;
            color: #fff;
            margin-bottom: 15px;
            text-transform: uppercase;
        }
        .video-placeholder {
            background-color: #2e2a47;
            width: 90%;
            height: 140px;
            margin: 0 auto;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }
        .play-icon {
            width: 50px;
            height: 50px;
            background-color: #fff;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .play-icon::after {
            content: '';
            display: block;
            width: 0;
            height: 0;
            border-top: 10px solid transparent;
            border-bottom: 10px solid transparent;
            border-left: 16px solid #110e21;
            margin-left: 4px;
        }

        /* Rodapé */
        footer {
            margin: 20px 0;
            font-size: 11px;
            color: #64748b;
        }
    </style>
</head>
<body>

    <!-- Menu Superior igual ao do Canal -->
    <nav>
        <a href="#" class="active">Início</a>
        <a href="https://youtube.com/@cafeteira-c3z">Vídeos</a>
        <a href="#">Comunidade</a>
        <a href="#">Contato</a>
    </nav>

    <!-- Container do Hub Principal -->
    <div class="container">
        
        <!-- Foto do canal puxando o nome atual -->
        <div class="avatar-container">
            <img src="Novo projeto 17 [ED23A58].png" alt="Cafeteira" class="avatar">
        </div>

        <h1>CAFETEIRA-C3Z ☕</h1>
        <div class="subtitle">BEM-VINDO AO HUB OFICIAL DO CANAL!</div>

        <!-- Links das Redes -->
        <a href="https://youtube.com/@cafeteira-c3z" class="btn">INSCREVA-SE NO YOUTUBE</a>
        <a href="https://discord.gg/5WfKhEMN" class="btn">ENTRE NO NOSSO DISCORD</a>
        <a href="https://www.tiktok.com/@cafeteiraofc" class="btn">CONHEÇA O PERSONAGEM!</a>

        <!-- Seção do Último Vídeo -->
        <div class="video-box">
            <div class="video-title">ÚLTIMO VÍDEO</div>
            <a href="https://youtube.com/@cafeteira-c3z" style="text-decoration: none;">
                <div class="video-placeholder">
                    <div class="play-icon"></div>
                </div>
            </a>
        </div>

    </div>

    <footer>
        © 2026 Cafeteira-c3z | Deixe seu Like!
    </footer>

</body>
</html>
